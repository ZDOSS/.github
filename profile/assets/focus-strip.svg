<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="180" viewBox="0 0 1280 180" role="img" aria-label="Focus areas">
  <defs>
    <linearGradient id="panel" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#101010"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6a6a6a"/>
      <stop offset="50%" stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#6a6a6a"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="180" fill="#080808"/>

  <!-- card 1 -->
  <rect x="20" y="20" width="400" height="140" fill="url(#panel)" stroke="#2a2a2a"/>
  <rect x="20" y="20" width="400" height="3" fill="url(#metal)" opacity="0.8"/>
  <text x="44" y="58" fill="#8a8a8a" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" letter-spacing="3">01</text>
  <text x="44" y="90" fill="#f2f2f2" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="600">Game tooling</text>
  <text x="44" y="120" fill="#9a9a9a" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="13">Bridges, generators, and assets</text>
  <text x="44" y="140" fill="#9a9a9a" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="13">that fit production pipelines.</text>

  <!-- card 2 -->
  <rect x="440" y="20" width="400" height="140" fill="url(#panel)" stroke="#2a2a2a"/>
  <rect x="440" y="20" width="400" height="3" fill="url(#metal)" opacity="0.8"/>
  <text x="464" y="58" fill="#8a8a8a" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" letter-spacing="3">02</text>
  <text x="464" y="90" fill="#f2f2f2" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="600">Creative automation</text>
  <text x="464" y="120" fill="#9a9a9a" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="13">Repeatable workflows for characters,</text>
  <text x="464" y="140" fill="#9a9a9a" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="13">content, and pipelines.</text>

  <!-- card 3 -->
  <rect x="860" y="20" width="400" height="140" fill="url(#panel)" stroke="#2a2a2a"/>
  <rect x="860" y="20" width="400" height="3" fill="url(#metal)" opacity="0.8"/>
  <text x="884" y="58" fill="#8a8a8a" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="11" letter-spacing="3">03</text>
  <text x="884" y="90" fill="#f2f2f2" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20" font-weight="600">Open data</text>
  <text x="884" y="120" fill="#9a9a9a" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="13">Transparent aggregation and</text>
  <text x="884" y="140" fill="#9a9a9a" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="13">public-facing utilities.</text>
</svg>
