      <stop offset="0%" stop-color="#0b0b0b"/>
      <stop offset="100%" stop-color="#141414"/>
    </linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6a6a6a"/>
